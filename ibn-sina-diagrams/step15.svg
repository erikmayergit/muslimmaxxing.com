<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#000"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="3">THE RELATIONSHIP</text>

  <!-- Dividing line -->
  <line x1="200" y1="240" x2="1000" y2="240" stroke="#555" stroke-width="0.5" stroke-dasharray="8,6"/>

  <!-- Above the line — necessary -->
  <text x="600" y="140" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">THE NECESSARY EXISTENT</text>

  <!-- Attributes in a row -->
  <text x="250" y="190" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">One</text>
  <text x="400" y="190" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">Eternal</text>
  <text x="550" y="190" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">Immaterial</text>
  <text x="700" y="190" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">Self-sufficient</text>
  <text x="880" y="190" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">Depends on nothing</text>

  <!-- Dots between -->
  <circle cx="325" cy="187" r="2" fill="#555"/>
  <circle cx="475" cy="187" r="2" fill="#555"/>
  <circle cx="625" cy="187" r="2" fill="#555"/>
  <circle cx="790" cy="187" r="2" fill="#555"/>

  <!-- One-way arrow -->
  <line x1="600" y1="250" x2="600" y2="310" stroke="#fff" stroke-width="1.5"/>
  <polygon points="600,320 594,308 606,308" fill="#fff"/>
  <text x="660" y="290" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">depends ↓</text>
  <text x="540" y="290" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12">one way</text>

  <!-- Below the line — contingent pile -->
  <ellipse cx="600" cy="430" rx="300" ry="110" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="600" y="420" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">ALL CONTINGENT THINGS</text>
  <text x="450" y="450" text-anchor="middle" fill="#333" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11">composite</text>
  <text x="600" y="460" text-anchor="middle" fill="#333" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11">dependent</text>
  <text x="750" y="450" text-anchor="middle" fill="#333" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11">made of pieces</text>

  <!-- Bottom quote -->
  <text x="600" y="570" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-style="italic">"O humanity! It is you who stand in need of Allah,</text>
  <text x="600" y="592" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-style="italic">but Allah alone is the Self-Sufficient, Praiseworthy." — Quran 35:15</text>
</svg>
