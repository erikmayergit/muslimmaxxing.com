<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#000"/>

  <!-- Necessary box with checkmark -->
  <rect x="400" y="180" width="400" height="140" rx="4" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="600" y="230" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">If it's NECESSARY</text>
  <text x="600" y="265" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16">then we already found it.</text>
  <text x="600" y="300" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">Argument complete. ✓</text>

  <!-- Arrow down -->
  <line x1="600" y1="340" x2="600" y2="390" stroke="#555" stroke-width="1.5"/>
  <polygon points="600,400 594,390 606,390" fill="#555"/>

  <!-- But note -->
  <text x="600" y="440" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16">But nothing we can see, touch, or measure is necessary.</text>
  <text x="600" y="470" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16">Everything around us is contingent.</text>
  <text x="600" y="510" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">So let's follow the harder path. →</text>
</svg>
