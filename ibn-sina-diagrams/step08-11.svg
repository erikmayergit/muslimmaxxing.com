<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#000"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="3">WHERE IS THE CAUSE?</text>

  <!-- The pile circle -->
  <ellipse cx="400" cy="300" rx="220" ry="180" fill="none" stroke="#fff" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="400" y="295" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">all contingent things</text>

  <!-- INSIDE arrow curving back in -->
  <path d="M 400 120 Q 320 160 350 220" fill="none" stroke="#888" stroke-width="1.5"/>
  <polygon points="350,220 344,208 356,210" fill="#888"/>
  <text x="300" y="110" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600">INSIDE?</text>

  <!-- X on inside - necessary -->
  <rect x="230" y="350" width="160" height="55" rx="3" fill="none" stroke="#888" stroke-width="1"/>
  <text x="310" y="375" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">Necessary?</text>
  <text x="310" y="395" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11">Contradiction.</text>
  <!-- X mark -->
  <line x1="240" y1="355" x2="380" y2="400" stroke="#fff" stroke-width="2"/>
  <line x1="380" y1="355" x2="240" y2="400" stroke="#fff" stroke-width="2"/>

  <!-- X on inside - contingent -->
  <rect x="420" y="350" width="160" height="55" rx="3" fill="none" stroke="#888" stroke-width="1"/>
  <text x="500" y="375" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">Contingent?</text>
  <text x="500" y="395" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11">Can't cause itself.</text>
  <!-- X mark -->
  <line x1="430" y1="355" x2="570" y2="400" stroke="#fff" stroke-width="2"/>
  <line x1="570" y1="355" x2="430" y2="400" stroke="#fff" stroke-width="2"/>

  <!-- OUTSIDE arrow -->
  <line x1="620" y1="300" x2="780" y2="300" stroke="#fff" stroke-width="2"/>
  <polygon points="790,300 778,294 778,306" fill="#fff"/>

  <text x="700" y="280" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600">OUTSIDE</text>

  <!-- Outside box -->
  <rect x="800" y="260" width="280" height="80" rx="4" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="940" y="295" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="700">The only option left.</text>
  <text x="940" y="320" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">The cause must be external.</text>

  <!-- Bottom text -->
  <text x="600" y="500" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">Both inside doors closed. Steps 10 &amp; 11.</text>
  <text x="600" y="530" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600">Logic leaves only one exit. Step 12.</text>
</svg>
