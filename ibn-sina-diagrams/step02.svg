<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#000"/>

  <!-- Center dot -->
  <circle cx="600" cy="160" r="8" fill="#fff"/>
  <text x="600" y="130" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="500">Everything that exists</text>

  <!-- Fork lines -->
  <line x1="600" y1="170" x2="350" y2="280" stroke="#fff" stroke-width="1.5"/>
  <line x1="600" y1="170" x2="850" y2="280" stroke="#fff" stroke-width="1.5"/>

  <!-- Contingent box -->
  <rect x="220" y="280" width="260" height="120" rx="4" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="350" y="325" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="700">CONTINGENT</text>
  <text x="350" y="355" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">Doesn't have to exist.</text>
  <text x="350" y="378" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">Depends on something else.</text>

  <!-- Necessary box -->
  <rect x="720" y="280" width="260" height="120" rx="4" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="850" y="325" text-anchor="middle" fill="#fff" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="700">NECESSARY</text>
  <text x="850" y="355" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">Must exist by its own nature.</text>
  <text x="850" y="378" text-anchor="middle" fill="#888" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">Depends on nothing.</text>

  <!-- OR label -->
  <text x="600" y="345" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">OR</text>

  <!-- Bottom note -->
  <text x="600" y="480" text-anchor="middle" fill="#555" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-style="italic">No third option.</text>
</svg>
